services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: apeme_db
      POSTGRES_USER: apeme
      POSTGRES_PASSWORD: apeme_dev_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apeme -d apeme_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://apeme:apeme_dev_pass@postgres:5432/apeme_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET en el archivo .env junto a este compose}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${PUBLIC_URL:-http://localhost:8081}
      WEB_URL: ${PUBLIC_URL:-http://localhost:8081}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DEMO_OTP_CODE: ${DEMO_OTP_CODE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
